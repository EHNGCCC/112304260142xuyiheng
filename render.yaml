services:
  - type: web
    name: digit-recognizer-cnn
    runtime: python
    rootDir: digit-recognizer-cnn
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir app app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
